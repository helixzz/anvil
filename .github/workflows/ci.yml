name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  backend:
    name: Backend (Python ${{ matrix.python }})
    runs-on: ubuntu-24.04
    strategy:
      matrix:
        python: ["3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e './backend[dev]'
      - run: cd backend && python -m ruff check .
      - run: cd backend && python -m pytest -q
        continue-on-error: true

  runner:
    name: Runner
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install -e './runner[dev]'
      - run: cd runner && python -m ruff check .

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build

  docker:
    name: Docker build matrix
    runs-on: ubuntu-24.04
    needs: [backend, runner, frontend]
    strategy:
      matrix:
        target: [backend, runner, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - run: |
          docker build -f ${{ matrix.target }}/Dockerfile -t anvil-${{ matrix.target }}:ci .
