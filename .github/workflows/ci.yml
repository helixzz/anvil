name: CI

on:
  push:
    branches: [main]
    tags: ['v*']
  pull_request:
    branches: [main]
  workflow_dispatch:

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: ${{ github.ref != 'refs/heads/main' && !startsWith(github.ref, 'refs/tags/') }}

jobs:
  backend:
    name: Backend (${{ matrix.python }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - name: Install
        run: |
          python -m pip install --upgrade pip
          pip install -e './backend[dev]' -e './runner[dev]'
          pip install coverage pytest-cov
      - name: Ruff lint
        run: python -m ruff check backend runner
      - name: Pytest with coverage
        run: |
          cd backend
          python -m pytest -q --cov=anvil --cov-report=xml --cov-report=term
      - name: Upload coverage
        if: matrix.python == '3.12'
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage
          path: backend/coverage.xml
          retention-days: 14

  runner:
    name: Runner (${{ matrix.python }})
    runs-on: ubuntu-24.04
    strategy:
      fail-fast: false
      matrix:
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
          cache: pip
      - run: pip install -e './runner[dev]'
      - run: cd runner && python -m ruff check .
      - name: Import smoke
        run: |
          python -c "from anvil_runner.server import run_server; from anvil_runner.fio import FioRunner; from anvil_runner.discovery import discover; from anvil_runner.env import environment_report; print('ok')"

  frontend:
    name: Frontend
    runs-on: ubuntu-24.04
    defaults:
      run:
        working-directory: frontend
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm install --no-audit --no-fund
      - run: npm run typecheck
      - run: npm run build
      - uses: actions/upload-artifact@v4
        with:
          name: web-dist
          path: frontend/dist
          retention-days: 14

  version-sync:
    name: Version sync
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Verify versions match across backend, runner, frontend
        run: |
          python3 - <<'PY'
          import json, tomllib, pathlib, sys
          root = pathlib.Path(".")
          be = tomllib.loads((root / "backend/pyproject.toml").read_text())["project"]["version"]
          rn = tomllib.loads((root / "runner/pyproject.toml").read_text())["project"]["version"]
          fe = json.loads((root / "frontend/package.json").read_text())["version"]
          dunders = {}
          for mod, path in (("backend", root / "backend/anvil/__init__.py"),
                            ("runner",  root / "runner/anvil_runner/__init__.py")):
              for line in path.read_text().splitlines():
                  if line.startswith("__version__"):
                      dunders[mod] = line.split("=", 1)[1].strip().strip('"').strip("'")
          print({"backend": be, "runner": rn, "frontend": fe, **dunders})
          versions = {be, rn, fe, *dunders.values()}
          if len(versions) != 1:
              print(f"FAIL: version mismatch: {versions}", file=sys.stderr)
              sys.exit(1)
          print(f"OK: all components at {be}")
          PY

  docker:
    name: Docker (${{ matrix.target }})
    runs-on: ubuntu-24.04
    needs: [backend, runner, frontend]
    strategy:
      fail-fast: false
      matrix:
        target: [backend, runner, frontend]
    steps:
      - uses: actions/checkout@v4
      - uses: docker/setup-buildx-action@v3
      - name: Build image
        run: |
          docker build -f ${{ matrix.target }}/Dockerfile \
            -t anvil-${{ matrix.target }}:ci \
            --cache-from type=gha \
            --cache-to type=gha,mode=max \
            .

  integration:
    name: Integration (compose + smoke)
    runs-on: ubuntu-24.04
    needs: [backend, runner, frontend]
    steps:
      - uses: actions/checkout@v4
      - name: Write .env
        run: |
          cat > .env <<'EOF'
          POSTGRES_USER=anvil
          POSTGRES_PASSWORD=ci-test-password
          POSTGRES_DB=anvil
          ANVIL_BEARER_TOKEN=ci-bearer-token-1234567890
          ANVIL_DATABASE_URL=postgresql+asyncpg://anvil:ci-test-password@db:5432/anvil
          ANVIL_RUNNER_SOCKET=/run/anvil/runner.sock
          ANVIL_DATA_DIR=/var/lib/anvil
          ANVIL_LOG_LEVEL=info
          ANVIL_SIMULATION_MODE=true
          ANVIL_HTTP_PORT=8080
          ANVIL_WEB_PORT=8081
          EOF
      - name: Compose up
        run: docker compose up -d --build
      - name: Wait for API health
        run: |
          for i in $(seq 1 30); do
            if curl -sf http://127.0.0.1:8080/api/health >/dev/null; then
              echo "API healthy after ${i}s"
              exit 0
            fi
            sleep 1
          done
          echo "API never became healthy"
          docker compose logs
          exit 1
      - name: Smoke test API endpoints
        env:
          TOKEN: ci-bearer-token-1234567890
        run: |
          set -e
          curl -sf http://127.0.0.1:8080/api/health | grep -q ok
          curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:8080/api/status | python3 -c "import json,sys; d=json.load(sys.stdin); assert d['simulation_mode']==True; print(d)"
          curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:8080/api/runs/profiles | python3 -c "import json,sys; ps=json.load(sys.stdin); assert len(ps) >= 8, ps; print(f'{len(ps)} profiles')"
          curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:8080/api/devices | python3 -c "import json,sys; print(f'{len(json.load(sys.stdin))} devices')"
          curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:8080/api/models | python3 -c "import json,sys; print(f'{len(json.load(sys.stdin))} models')"
          curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:8080/api/environment | python3 -c "import json,sys; d=json.load(sys.stdin); print(f\"{d['summary']['total']} checks\")"
          # Web container serves the SPA + proxies /api
          curl -sfI http://127.0.0.1:8081/ | grep -qi "cache-control: no-store"
          curl -sf -H "Authorization: Bearer $TOKEN" http://127.0.0.1:8081/api/status >/dev/null
      - name: Compose logs on failure
        if: failure()
        run: docker compose logs --no-color
      - name: Compose down
        if: always()
        run: docker compose down -v
