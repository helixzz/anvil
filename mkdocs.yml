site_name: Anvil
site_description: NVMe Validator & IOps Lab — user and operator documentation
site_url: https://helixzz.github.io/anvil/
repo_url: https://github.com/helixzz/anvil
repo_name: helixzz/anvil
edit_uri: edit/main/docs/

theme:
  name: material
  palette:
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-7
        name: Switch to light mode
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: indigo
      accent: amber
      toggle:
        icon: material/brightness-4
        name: Switch to dark mode
  features:
    - navigation.instant
    - navigation.tabs
    - navigation.sections
    - navigation.top
    - toc.integrate
    - search.suggest
    - search.highlight
    - content.code.copy
    - content.action.edit
  icon:
    repo: fontawesome/brands/github

markdown_extensions:
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true

nav:
  - Home: index.md
  - Getting Started:
      - Installation: getting-started/install.md
      - First run: getting-started/first-run.md
  - User Guide:
      - Profiles: user-guide/profiles.md
      - Running a benchmark: user-guide/running.md
      - Reading a report: user-guide/reports.md
      - Comparing devices: user-guide/compare.md
      - Public share links: user-guide/sharing.md
  - Operator Guide:
      - RBAC: operator-guide/rbac.md
      - SSO: operator-guide/sso.md
      - Environment auto-tune: operator-guide/env-tune.md
      - Crash recovery: operator-guide/recovery.md
      - Security notes: operator-guide/security.md
  - Reference:
      - HTTP API: reference/api.md
      - CHANGELOG: CHANGELOG.md
      - Design: DESIGN.md
